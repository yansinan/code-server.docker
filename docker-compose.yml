version: '3.8'
services:
  code-server:
    container_name: code
    image: codercom/code-server:latest
    restart: on-failure:10
    networks:
      - nginxNet
    ports:
      - "5000:8080"   # 将容器的8080端口映射到电脑的8080端口
    environment:
      - DOCKER_USER=$USER
      - PASSWORD=设置一个强密码！  # 设置一个强密码！
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      # - ~/:/home/coder/  # 把代码存到电脑本地
      # - ./config:/home/coder/.local/share/code-server # 持久化配置
      - $HOME/.local:/home/coder/.local
      - $HOME/.config:/home/coder/.config
      - $HOME/workspace:/home/coder/project
networks:
  nginxNet:
    external: true

    
